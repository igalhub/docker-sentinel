name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Run offline tests with coverage gate
        # Threshold set with real margin below the honest, fresh-clone-measured
        # 97.05% baseline (DS-017) — coverage.py's fail_under check compares the
        # *rounded* percentage (round(x, precision) < fail_under), so a threshold
        # sitting exactly at a value the real percentage rounds up to can silently
        # pass while still printing a FAIL message. .coveragerc sets precision=2 to
        # shrink that blind spot, but real margin here is what actually prevents it.
        run: pytest -m "not docker" -v --cov=checker --cov=dashboard --cov-fail-under=96
